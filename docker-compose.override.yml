version: '3.8'

services:
  frontend:
    build: ./frontend
    target: dev # Hier wird das Build-Target dev angegeben
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app  # Code wird ins Container-Verzeichnis eingebunden
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/smartbaudoc
    volumes:
      - ./backend:/app  # Code wird eingebunden, ideal für Spring Boot mit Dev-Tools
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
